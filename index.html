<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Promozionale — SUPSI FC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e2e0d8;
  --border-strong: #c8c5bb;
  --text: #1a1916;
  --text-muted: #7a7870;
  --text-faint: #b0ae a6;

  --msk: #1a5c96;
  --msk-bg: #deeaf7;
  --msk-light: #eef4fb;

  --efa: #2d6e2d;
  --efa-bg: #d5ecd5;
  --efa-light: #eaf4ea;

  --dn: #8a4f00;
  --dn-bg: #fde8c0;
  --dn-light: #fef4e0;

  --ann: #8c2f5a;
  --ann-bg: #f5cfe0;
  --ann-light: #faeef4;

  --p1: #4a3d9c;
  --p1-bg: #e8e5f8;
  --p1-border: #9b93e0;

  --p2: #3730a3;
  --p2-bg: #d4d2f0;
  --p2-border: #7069cc;

  --p3: #1e1b6b;
  --p3-bg: #b8b5e0;
  --p3-border: #4540a0;

  --custom: #0a5c4a;
  --custom-bg: #cceee5;
  --custom-border: #2aa888;

  --radius: 6px;
  --radius-lg: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.header-left p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 1px;
}

.nav-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: background 0.15s, border-color 0.15s;
}
.nav-btn:hover { background: var(--bg); border-color: var(--border-strong); }

.month-display {
  font-size: 14px;
  font-weight: 600;
  min-width: 170px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  letter-spacing: -0.01em;
  color: var(--text);
}

.btn {
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg); }
.btn-primary {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
}
.btn-primary:hover { background: #333; }

.legend-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
}

.leg {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 500;
}
.leg-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.leg-sep {
  width: 1px;
  height: 14px;
  background: var(--border);
}

.main {
  padding: 20px 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 3px;
}
.day-name {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 6px 0;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.day-cell {
  min-height: 110px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
}
.day-cell:hover {
  border-color: var(--border-strong);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.day-cell.other-month {
  background: transparent;
  border-color: transparent;
  opacity: 0.4;
}
.day-cell.today {
  border-color: #1a5c96;
  border-width: 1.5px;
}
.day-cell.today .day-num {
  background: #1a5c96;
  color: white;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.day-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-family: 'DM Mono', monospace;
}

.ev {
  border-radius: 3px;
  padding: 2px 5px;
  font-size: 9.5px;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 2px;
  word-break: break-word;
  cursor: default;
}
.ev.msk { background: var(--msk-bg); color: var(--msk); }
.ev.efa { background: var(--efa-bg); color: var(--efa); }
.ev.dn  { background: var(--dn-bg);  color: var(--dn);  }
.ev.ann { background: var(--ann-bg); color: var(--ann); }
.ev.p1  { background: var(--p1-bg);  color: var(--p1);  border-left: 2.5px solid var(--p1-border); cursor: pointer; }
.ev.p2  { background: var(--p2-bg);  color: var(--p2);  border-left: 2.5px solid var(--p2-border); cursor: pointer; }
.ev.p3  { background: var(--p3-bg);  color: var(--p3);  border-left: 2.5px solid var(--p3-border); cursor: pointer; }
.ev.custom { background: var(--custom-bg); color: var(--custom); border-left: 2.5px solid var(--custom-border); cursor: pointer; }
.ev.user-added { cursor: pointer; }

/* Modal */
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.35);
  display: flex; align-items: center; justify-content: center;
  z-index: 500;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 24px;
  width: 380px;
  max-width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.modal h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}
.form-row { margin-bottom: 12px; }
.form-row label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.form-row input,
.form-row textarea,
.form-row select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s;
}
.form-row input:focus,
.form-row textarea:focus,
.form-row select:focus {
  outline: none;
  border-color: var(--border-strong);
}
.form-row textarea { min-height: 70px; resize: vertical; }
.modal-btns {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
}

/* Detail popup */
.detail-box {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 20px;
  width: 340px;
  max-width: 95vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.detail-box .det-type {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 3px;
  display: inline-block;
  margin-bottom: 10px;
}
.detail-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
.detail-box .det-date { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 10px; }
.detail-box .det-note { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 14px; }

@media (max-width: 768px) {
  .main { padding: 12px; }
  header { padding: 12px 16px; }
  .legend-bar { padding: 8px 16px; gap: 10px; }
  .day-cell { min-height: 70px; padding: 4px; }
  .ev { font-size: 8.5px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Calendario Promozionale — SUPSI FC</h1>
    <p>Seminari e pianificazione contenuti per IG, LinkedIn, Newsletter</p>
  </div>
  <div class="nav-controls">
    <button class="nav-btn" onclick="chMonth(-1)">&#8249;</button>
    <span class="month-display" id="mlabel"></span>
    <button class="nav-btn" onclick="chMonth(1)">&#8250;</button>
    <button class="btn" onclick="goToday()">Oggi</button>
    <button class="btn btn-primary" onclick="openAdd(null)">+ Aggiungi</button>
  </div>
</header>

<div class="legend-bar">
  <div class="leg"><div class="leg-dot" style="background:var(--msk-bg);border:1px solid var(--msk)"></div>CAS MSK</div>
  <div class="leg"><div class="leg-dot" style="background:var(--efa-bg);border:1px solid var(--efa)"></div>Es. Fis. Adattato</div>
  <div class="leg"><div class="leg-dot" style="background:var(--dn-bg);border:1px solid var(--dn)"></div>Dry Needling</div>
  <div class="leg"><div class="leg-dot" style="background:var(--ann-bg);border:1px solid var(--ann)"></div>Neuropatie</div>
  <div class="leg-sep"></div>
  <div class="leg"><div class="leg-dot" style="background:var(--p1-bg);border-left:3px solid var(--p1-border)"></div>Ondata 1 — Awareness</div>
  <div class="leg"><div class="leg-dot" style="background:var(--p2-bg);border-left:3px solid var(--p2-border)"></div>Ondata 2 — Clinical pill</div>
  <div class="leg"><div class="leg-dot" style="background:var(--p3-bg);border-left:3px solid var(--p3-border)"></div>Ondata 3 — Call to action</div>
  <div class="leg"><div class="leg-dot" style="background:var(--custom-bg);border-left:3px solid var(--custom-border)"></div>Evento custom</div>
</div>

<div class="main">
  <div class="cal-header" id="dnames"></div>
  <div class="cal-grid" id="cgrid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="mtitle">Aggiungi evento</h3>
    <div class="form-row">
      <label>Data</label>
      <input type="date" id="ev-date" />
    </div>
    <div class="form-row">
      <label>Tipo</label>
      <select id="ev-type">
        <option value="p1">Ondata 1 — Awareness</option>
        <option value="p2">Ondata 2 — Clinical pill</option>
        <option value="p3">Ondata 3 — Call to action</option>
        <option value="custom">Evento custom</option>
      </select>
    </div>
    <div class="form-row">
      <label>Testo</label>
      <input type="text" id="ev-text" placeholder="es. Promo Sem.2 MSK — Tendinopatie" />
    </div>
    <div class="form-row">
      <label>Canale</label>
      <select id="ev-channel">
        <option value="">— seleziona —</option>
        <option>Instagram</option>
        <option>LinkedIn</option>
        <option>Newsletter</option>
        <option>Instagram + LinkedIn</option>
        <option>Tutti i canali</option>
        <option>Altro</option>
      </select>
    </div>
    <div class="form-row">
      <label>Note</label>
      <textarea id="ev-note" placeholder="Formato, link, idee di contenuto..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Annulla</button>
      <button class="btn" id="bdel" style="display:none;color:#a00;border-color:#f5b5b5" onclick="delEv()">Elimina</button>
      <button class="btn btn-primary" onclick="saveEv()">Salva</button>
    </div>
  </div>
</div>

<!-- Detail popup -->
<div class="overlay" id="detail" style="display:none">
  <div class="detail-box">
    <div class="det-type" id="det-type-tag"></div>
    <h3 id="det-title"></h3>
    <div class="det-date" id="det-date"></div>
    <div class="det-note" id="det-note"></div>
    <button class="btn" style="width:100%" onclick="closeDetail()">Chiudi</button>
  </div>
</div>

<script>
const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const WDAYS=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

const TYPE_LABELS={
  p1:'Ondata 1 — Awareness',
  p2:'Ondata 2 — Clinical pill',
  p3:'Ondata 3 — Call to action',
  custom:'Evento custom',
  msk:'CAS MSK',efa:'Es. Fis. Adattato',dn:'Dry Needling',ann:'Neuropatie'
};
const TYPE_COLORS={
  p1:'background:#e8e5f8;color:#4a3d9c',
  p2:'background:#d4d2f0;color:#3730a3',
  p3:'background:#b8b5e0;color:#1e1b6b',
  custom:'background:#cceee5;color:#0a5c4a'
};

function addDays(s,n){const d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function subMonths(s,m){const d=new Date(s+'T00:00:00');d.setMonth(d.getMonth()-m);return d.toISOString().slice(0,10)}
function subWeeks(s,w){return addDays(s,-7*w)}
function toKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmtDate(s){const[y,m,d]=s.split('-');return `${d}/${m}/${y}`}

const SEMINARS=[
  {type:'msk',start:'2026-10-02',end:'2026-10-04',label:'MSK Sem.1 — Comorbidità e genere'},
  {type:'msk',start:'2026-11-06',end:'2026-11-08',label:'MSK Sem.2 — Quadrante inf. e MET'},
  {type:'msk',start:'2026-12-05',end:'2026-12-06',label:'MSK Sem.3 — Graded Motor Imagery'},
  {type:'msk',start:'2027-02-21',end:'2027-02-24',label:'MSK Sem.4 — Radicolopatie'},
  {type:'msk',start:'2027-03-06',end:'2027-03-07',label:'MSK Sem.5 — Schmid'},
  {type:'msk',start:'2027-03-26',end:'2027-03-28',label:'MSK Sem.6 — CMT cervicale (McCarthy)'},
  {type:'msk',start:'2027-04-20',end:'2027-04-22',label:'MSK Sem.7 — Cefalee (Di Antonio)'},
  {type:'msk',start:'2027-05-16',end:'2027-05-18',label:'MSK Sem.8 — CRAFTA / Tendinopatie'},
  {type:'msk',start:'2027-06-21',end:'2027-06-23',label:'MSK Sem.9 — CMT toraco-lombare'},
  {type:'msk',start:'2027-09-03',end:'2027-09-05',label:'MSK Sem.10 — Groin Pain (Thorborg)'},
  {type:'efa',start:'2026-09-24',end:'2026-09-27',label:'EFA Sem.1 — Fisiologia / Motivazionale'},
  {type:'efa',start:'2026-10-15',end:'2026-10-17',label:'EFA Sem.2 — Oncologia'},
  {type:'efa',start:'2026-11-19',end:'2026-11-22',label:'EFA Sem.3 — Patologie metaboliche'},
  {type:'efa',start:'2027-01-14',end:'2027-01-17',label:'EFA Sem.4 — Patologie cardiovascolari'},
  {type:'efa',start:'2027-02-26',end:'2027-02-28',label:'EFA Sem.5 — Respiratorio / Arteriopatie'},
  {type:'efa',start:'2027-04-08',end:'2027-04-11',label:'EFA Sem.6 — Patologie reumatiche'},
  {type:'dn', start:'2026-10-02',end:'2026-10-03',label:'Dry Needling — Lezioni in aula'},
  {type:'dn', start:'2026-10-24',end:'2026-10-24',label:'Dry Needling — Corso MISV'},
  {type:'ann',start:'2026-12-18',end:'2026-12-19',label:'Neuropatie — Annina Schmid'},
];

function buildPromo(){
  const ps=[];
  SEMINARS.forEach(s=>{
    const close=subMonths(s.start,1);
    const o1=subMonths(close,2);
    const o2=subWeeks(close,6);
    const o3=subWeeks(close,2);
    ps.push({date:o1,type:'p1',text:'Awareness — '+s.label,note:'Ondata 1: 2 mesi prima della chiusura iscrizioni ('+fmtDate(close)+'). Canali consigliati: IG + LinkedIn + Newsletter. Formato: post singolo o carosello introduttivo.'});
    ps.push({date:o2,type:'p2',text:'Clinical pill — '+s.label,note:'Ondata 2: 6 settimane prima della chiusura iscrizioni ('+fmtDate(close)+'). Canali consigliati: IG carousel + LinkedIn. Formato: contenuto clinico approfondito sul tema del seminario.'});
    ps.push({date:o3,type:'p3',text:'CTA iscrizioni — '+s.label,note:'Ondata 3: 2 settimane prima della chiusura iscrizioni ('+fmtDate(close)+'). Canali: tutti. Iscrizioni chiudono il '+fmtDate(close)+'. Formato: post urgenza + stories + newsletter.'});
  });
  return ps;
}

const AUTO_PROMOS=buildPromo();
let userEvents=JSON.parse(localStorage.getItem('supsi_promo_v3')||'[]');
let current=new Date(2026,5,1);
let modalDate=null,editIdx=null;

function getSems(ds){return SEMINARS.filter(s=>ds>=s.start&&ds<=s.end)}
function getAuto(ds){return AUTO_PROMOS.filter(p=>p.date===ds)}
function getUser(ds){return userEvents.filter(e=>e.date===ds)}

function render(){
  const y=current.getFullYear(),m=current.getMonth();
  document.getElementById('mlabel').textContent=MONTHS[m]+' '+y;
  document.getElementById('dnames').innerHTML=WDAYS.map(d=>`<div class="day-name">${d}</div>`).join('');
  const first=new Date(y,m,1);
  let dow=first.getDay();dow=(dow===0)?6:dow-1;
  const dim=new Date(y,m+1,0).getDate();
  const dip=new Date(y,m,0).getDate();
  const today=new Date();
  const todayStr=toKey(today.getFullYear(),today.getMonth(),today.getDate());
  let cells=[];
  for(let i=0;i<dow;i++){const d=dip-dow+1+i;cells.push({d,ds:toKey(y,m-1,d),other:true})}
  for(let d=1;d<=dim;d++){cells.push({d,ds:toKey(y,m,d),other:false})}
  const rem=cells.length%7===0?0:7-(cells.length%7);
  for(let i=1;i<=rem;i++){cells.push({d:i,ds:toKey(y,m+1,i),other:true})}
  document.getElementById('cgrid').innerHTML=cells.map(c=>{
    const sems=getSems(c.ds);
    const autos=getAuto(c.ds);
    const users=getUser(c.ds);
    const isToday=c.ds===todayStr;
    const semH=sems.map(s=>`<div class="ev ${s.type}">${s.label}</div>`).join('');
    const autoH=autos.map(p=>`<div class="ev ${p.type}" onclick="showDetail(event,'${p.date}','${encodeURIComponent(p.text)}','${encodeURIComponent(p.note)}','${p.type}')">${p.text}</div>`).join('');
    const userH=users.map(e=>`<div class="ev ${e.type} user-added" onclick="openEdit(event,'${c.ds}',${userEvents.indexOf(e)})">${e.text}</div>`).join('');
    return `<div class="day-cell${c.other?' other-month':''}${isToday?' today':''}" onclick="openAdd('${c.ds}')">
      <div class="day-num">${c.d}</div>${semH}${autoH}${userH}
    </div>`;
  }).join('');
}

function chMonth(d){current.setMonth(current.getMonth()+d);render()}
function goToday(){current=new Date();current.setDate(1);render()}

function openAdd(ds){
  modalDate=ds||toKey(current.getFullYear(),current.getMonth(),1);
  editIdx=null;
  document.getElementById('mtitle').textContent='Aggiungi evento';
  document.getElementById('ev-date').value=modalDate;
  document.getElementById('ev-type').value='p1';
  document.getElementById('ev-text').value='';
  document.getElementById('ev-channel').value='';
  document.getElementById('ev-note').value='';
  document.getElementById('bdel').style.display='none';
  document.getElementById('modal').style.display='flex';
}

function openEdit(e,ds,idx){
  e.stopPropagation();
  const ev=userEvents[idx];if(!ev)return;
  modalDate=ds;editIdx=idx;
  document.getElementById('mtitle').textContent='Modifica evento';
  document.getElementById('ev-date').value=ev.date;
  document.getElementById('ev-type').value=ev.type;
  document.getElementById('ev-text').value=ev.text;
  document.getElementById('ev-channel').value=ev.channel||'';
  document.getElementById('ev-note').value=ev.note||'';
  document.getElementById('bdel').style.display='inline-block';
  document.getElementById('modal').style.display='flex';
}

function closeModal(){document.getElementById('modal').style.display='none'}

function saveEv(){
  const text=document.getElementById('ev-text').value.trim();
  if(!text)return;
  const ev={
    date:document.getElementById('ev-date').value,
    type:document.getElementById('ev-type').value,
    text,channel:document.getElementById('ev-channel').value,
    note:document.getElementById('ev-note').value.trim()
  };
  if(editIdx!==null){userEvents[editIdx]=ev}else{userEvents.push(ev)}
  localStorage.setItem('supsi_promo_v3',JSON.stringify(userEvents));
  closeModal();render();
}

function delEv(){
  if(editIdx===null)return;
  userEvents.splice(editIdx,1);
  localStorage.setItem('supsi_promo_v3',JSON.stringify(userEvents));
  closeModal();render();
}

function showDetail(e,date,textEnc,noteEnc,type){
  e.stopPropagation();
  const tag=document.getElementById('det-type-tag');
  tag.textContent=TYPE_LABELS[type]||type;
  tag.setAttribute('style',(TYPE_COLORS[type]||'background:#eee;color:#333')+';font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:10px');
  document.getElementById('det-title').textContent=decodeURIComponent(textEnc);
  document.getElementById('det-date').textContent=fmtDate(date);
  document.getElementById('det-note').textContent=decodeURIComponent(noteEnc);
  document.getElementById('detail').style.display='flex';
}
function closeDetail(){document.getElementById('detail').style.display='none'}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('detail').addEventListener('click',function(e){if(e.target===this)closeDetail()});

render();
</script>
</body>
